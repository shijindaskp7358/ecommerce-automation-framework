name: CI

on:
    push: 
      branches: [ main ]
    pull_request:
      branches: [ main ]

jobs:
  
  test:
    runs-on: ubuntu-latest

    steps:

        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'
          
        - name: Install Dependencies
          run: |
              pip install -r requirements.txt
            
        - name: Setup Chrome
          uses: browser-actions/setup-chrome@v1

        - name: Run tests
          run : pytest -v
